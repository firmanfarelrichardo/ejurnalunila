name: E-Jurnal CI/CD Pipeline Dasar

on:
  push:
    branches: [ "main", "staging", "production" ]
  pull_request:
    branches: [ "main", "staging", "production" ]

jobs:
  # ==========================================
  # TAHAP 1: PENGECEKAN KODE PHP
  # ==========================================
  test-php:
    name: Cek Sintaks PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Cek Error PHP
        run: find . -type f -name "*.php" -print0 | xargs -0 -n1 php -l > /dev/null

  # ==========================================
  # TAHAP 2: BUILD FRONTEND
  # ==========================================
  build-frontend:
    name: Build Aset Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: ./frontend
        run: |
          rm -rf node_modules
          npm install
          npx vite build

  # ==========================================
  # TAHAP 3: DEPLOY KE STAGING
  # ==========================================
  deploy-staging:
    name: Deploy ke Staging
    needs: [test-php, build-frontend]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Staging
        run: |
          echo "Memulai deploy ke staging..."
          echo "Deployment Staging Berhasil!"

  # ==========================================
  # TAHAP 4: DEPLOY KE PRODUCTION
  # ==========================================
  deploy-production:
    name: Deploy ke Production
    needs: [test-php, build-frontend]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Production
        run: |
          echo "Memulai deploy ke production..."
          echo "Deployment Production Selesai!"